name: Deploy to GitHub Pages

# Enables GitHub Pages (if not already on) and deploys the site on every push to
# main. No manual settings step is required — actions/configure-pages with
# enablement:true turns Pages on via the API.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Publish only the static site: index.html (the usable app) + crossarch/
      # (the determinism tester). Keeps repo source out of the served site.
      - name: Assemble site
        run: |
          mkdir -p _site/crossarch
          cp index.html _site/index.html
          cp crossarch/index.html _site/crossarch/index.html

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
